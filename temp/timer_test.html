<html><head><script src="https://code.jquery.com/jquery-3.6.3.min.js"></script><script src="jquery.countdown.min.js"></script><script>$(document).load(function () {     var now = new Date();     $("#t").countdown(now + 5000, function(event) {          $(this).html(event.strftime('%D days %H:%M:%S'))        });          //$("#t").on('update.countdown', function (event) {     //    console.log("time" + event.offset.totalSeconds);     //});});  </script></head><body><div id="t"></div></body></html>
